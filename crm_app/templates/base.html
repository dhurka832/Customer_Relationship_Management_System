{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CRM System - Manage customers and leads efficiently">

    <title>{% block title %}CRM System{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Our single custom stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="app-container">

        <!-- ===== Sidebar Navigation ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>
                    <i class="bi bi-graph-up"></i> CRM
                </h1>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li>
                        <a href="{% url 'dashboard' %}"
                           class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            <i class="bi bi-speedometer2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'customer-list' %}"
                           class="{% if 'customer' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-people"></i>
                            <span>Customers</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'lead-list' %}"
                           class="{% if 'lead' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-briefcase"></i>
                            <span>Leads</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'add-followup' %}"
                           class="{% if 'followup' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-calendar-event"></i>
                            <span>Follow-ups</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- ===== Main Content ===== -->
        <main class="main-content">

            <!-- Top Bar -->
            <div class="top-bar">
                <!-- Dark Mode Toggle -->
                <button id="darkModeToggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                    <i class="bi bi-moon-fill"></i>
                </button>

                <!-- User Info -->
                <div class="top-bar-user">
                    <i class="bi bi-person-circle"></i>
                    <span>{{ user.username }}</span>
                </div>

                <!-- Logout -->
                <a href="{% url 'logout' %}" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>

            <!-- Flash Messages -->
            {% if messages %}
                <div class="messages-container">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                            <i class="bi bi-check-circle"></i>
                            <div>{{ message }}</div>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- Page Content -->
            <div class="content">
                <div class="page-container">
                    {% block content %}{% endblock %}
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Sidebar Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Menu">
        <i class="bi bi-list"></i>
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ===== Sidebar Toggle (Mobile) =====
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });

            document.querySelectorAll('.sidebar-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('active');
                    }
                });
            });
        }

        // ===== Auto-close alerts after 5 seconds =====
        document.querySelectorAll('.alert').forEach(alert => {
            setTimeout(() => {
                if (alert) {
                    alert.style.opacity = '0';
                    alert.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => alert.remove(), 400);
                }
            }, 5000);
        });

        // ===== Dark Mode Toggle =====
        const darkModeToggle = document.getElementById('darkModeToggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedMode = localStorage.getItem('darkMode');
        const isDark = savedMode ? savedMode === 'true' : prefersDark;

        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (darkModeToggle) {
                darkModeToggle.innerHTML = '<i class="bi bi-sun-fill"></i>';
                darkModeToggle.title = 'Switch to Light Mode';
            }
        }

        if (darkModeToggle) {
            darkModeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('darkMode', newTheme === 'dark');

                darkModeToggle.innerHTML = newTheme === 'dark'
                    ? '<i class="bi bi-sun-fill"></i>'
                    : '<i class="bi bi-moon-fill"></i>';

                darkModeToggle.title = newTheme === 'dark'
                    ? 'Switch to Light Mode'
                    : 'Switch to Dark Mode';
            });
        }
    </script>
</body>

</html>
