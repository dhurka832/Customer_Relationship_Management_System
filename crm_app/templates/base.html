{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CRM System - Manage customers and leads efficiently">

    <title>{% block title %}CRM System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="app-container">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>
                    <i class="bi bi-graph-up"></i> CRM
                </h1>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li>
                        <a href="{% url 'dashboard' %}"
                           class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            <i class="bi bi-speedometer2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'customer-list' %}"
                           class="{% if 'customer' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-people"></i>
                            <span>Customers</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'lead-list' %}"
                           class="{% if 'lead' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-briefcase"></i>
                            <span>Leads</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'add-followup' %}"
                           class="{% if 'followup' in request.resolver_match.url_name %}active{% endif %}">
                            <i class="bi bi-calendar-event"></i>
                            <span>Follow-ups</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">

            <div class="top-bar">

                <div class="top-bar-user">
                    <i class="bi bi-person-circle"></i>
                    <span>{{ user.username }}</span>
                </div>

                <a href="{% url 'logout' %}" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>

            {% if messages %}
                <div class="messages-container">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                            <i class="bi bi-check-circle"></i>
                            <div>{{ message }}</div>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="content">
                <div class="page-container">
                    {% block content %}{% endblock %}
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
