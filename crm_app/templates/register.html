{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CRM System - Register">
    <title>Register - CRM System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-logo">
                    <i class="bi bi-graph-up"></i>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join our CRM platform today</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                        <i class="bi bi-info-circle-fill"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="auth-form" id="registerForm">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="form-input-wrapper">
                        <i class="form-input-icon bi bi-person"></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="Choose a username"
                            required
                            autocomplete="username"
                            minlength="3"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="form-input-wrapper">
                        <i class="form-input-icon bi bi-lock"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Create a strong password"
                            required
                            autocomplete="new-password"
                            minlength="6"
                        >
                    </div>

                </div>

                <div class="form-group">
                    <label for="password2">Confirm Password</label>
                    <div class="form-input-wrapper">
                        <i class="form-input-icon bi bi-lock-check"></i>
                        <input
                            type="password"
                            id="password2"
                            name="password2"
                            class="form-control"
                            placeholder="Re-enter your password"
                            required
                            autocomplete="new-password"
                        >
                    </div>

                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="bi bi-person-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-divider">
                <span class="auth-divider-text">Already have an account?</span>
            </div>

            <div class="auth-footer">
                <p class="auth-footer-text">
                    Sign in here:
                    <a href="{% url 'login' %}" class="auth-footer-link">Login</a>
                </p>
            </div>

        </div>
    </div>

</body>

</html>
