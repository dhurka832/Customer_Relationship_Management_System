{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CRM System - Login">
    <title>Login - CRM System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-logo">
                    <i class="bi bi-graph-up"></i>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your CRM account</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                        <i class="bi bi-info-circle-fill"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="form-input-wrapper">
                        <i class="form-input-icon bi bi-person"></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="form-input-wrapper">
                        <i class="form-input-icon bi bi-lock"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span class="auth-divider-text">Don't have an account?</span>
            </div>

            <div class="auth-footer">
                <p class="auth-footer-text">
                    Create a new account:
                    <a href="{% url 'register' %}" class="auth-footer-link">Sign Up</a>
                </p>
            </div>

        </div>
    </div>

</body>

</html>
