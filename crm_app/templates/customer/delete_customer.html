{% extends 'base.html' %}

{% block title %}Delete Customer - CRM{% endblock %}

{% block content %}

<div class="flex-center" style="min-height: 50vh;">
    <div class="card text-center" style="max-width: 480px; width: 100%;">
        <div class="card-body">

            <div style="font-size: 3.5rem; color: var(--danger); margin-bottom: 1rem;">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>

            <h3>Delete Customer?</h3>
            <p class="text-muted mb-4">
                Are you sure you want to delete
                <strong style="color: var(--text-primary);">{{ customer.name }}</strong>?
                <br>This action cannot be undone.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="flex-center gap-3">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, Delete
                    </button>
                    <a href="{% url 'customer-list' %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
