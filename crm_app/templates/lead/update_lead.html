{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Update Lead - CRM{% endblock %}

{% block content %}

<div class="mb-4">
    <h2><i class="bi bi-pencil-square"></i> Update Lead</h2>
    <p class="text-muted">Edit the lead details below.</p>
</div>

<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Update Lead
                </button>
                <a href="{% url 'lead-list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
