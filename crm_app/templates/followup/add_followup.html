{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Add Follow-Up - CRM{% endblock %}

{% block content %}

<div class="mb-4">
    <h2><i class="bi bi-calendar-plus"></i> Add Follow-Up</h2>
    <p class="text-muted">Schedule a new follow-up with a customer.</p>
</div>

<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-calendar-check"></i> Save Follow-Up
                </button>
                <a href="{% url 'customer-list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
